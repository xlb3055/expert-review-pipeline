project:
  name: expert_review
  description: "专家考核产物自动审核"

feishu:
  # 凭证（从环境变量读取）
  app_id: ""
  app_secret: ""
  # 主表 — 数据源 + 最终回填
  app_token: "TdiNb881Ja89b9s6FwNcOH1Vn4c"
  table_id: "tblE2Qdot3No2kUC"

stages:
  - name: pre_screen
    script: pre_screen.py
    description: "脚本粗筛"
    exit_code_handling:
      0: continue
      1: stop
      2: continue
  - name: ai_review
    script: ai_review.py
    description: "AI 评审"
    exit_code_handling:
      0: continue
      1: continue   # 失败不致命
  - name: writeback
    script: writeback.py
    description: "结果回填"
    exit_code_handling:
      0: continue

ai_review:
  prompt_file: prompt.md
  schema_file: schema.json
  model: ""
  timeout: 600
  sandbox_snapshot: "daytona-medium"
  sandbox_resources:
    cpu: 2
    memory: 2
    disk: 5

scoring:
  # 综合分 = 能力分百分比 * 50% + 资产分百分比 * 50%，>= pass_score 为通过
  pass_score: 80
  expert_ability:
    max_total: 10
    dimensions:
      - { key: task_complexity, max_score: 3 }
      - { key: iteration_quality, max_score: 3 }
      - { key: professional_judgment, max_score: 4 }
  trace_asset:
    max_total: 12
    dimensions:
      - { key: authenticity, max_score: 2 }
      - { key: info_density, max_score: 2 }
      - { key: tool_loop, max_score: 2 }
      - { key: correction_value, max_score: 2 }
      - { key: verification_loop, max_score: 2 }
      - { key: compliance, max_score: 2 }

# 字段映射（逻辑名 → 实际飞书字段名）
field_mapping:
  task_description: "任务说明"
  trace_file: "Trace 文件"
  expert_name: "提交人"         # 主表是 person 类型
  expert_id: "talent_id"       # 主表是 lookup 类型
  position: "岗位方向"
  final_product: "最终产物"      # 主表是附件类型
  original_product: "原始产物"
  review_status: "审核状态"      # 回填目标
  machine_review_note: "机审说明" # 回填目标（详细逐维度解析）
  machine_review_remark: "机审备注" # 回填目标（结论 + 给专家看的人话反馈）

# 主表审核状态映射
conclusion_to_status:
  pass: "最终审核通过"
  manual_review: "初审中"
  reject: "已拒绝"

pre_screen:
  min_conversation_rounds: 3

workspace:
  trace_path: "/workspace/trace.jsonl"
  pre_screen_result_path: "/workspace/pre_screen_result.json"
  ai_review_result_path: "/workspace/ai_review_result.json"
  ai_review_error_path: "/workspace/ai_review_error.json"
